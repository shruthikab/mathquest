<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MathQuest Question Bank</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="practiceBackdrop" class="practice-backdrop" aria-hidden="true"></div>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="login-header">
          <h1>MathQuest</h1>
          <p class="login-subhead">Question Bank</p>
        </div>

        <div class="login-tabs">
          <button class="login-tab active" data-tab="login">Sign In</button>
          <button class="login-tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required />
          </div>
          <div id="loginError" class="form-error hidden"></div>
          <button type="submit" class="login-btn">Sign In</button>

          <div class="divider">
            <span>or</span>
          </div>

          <a href="/api/auth/google" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
          </a>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="login-form hidden">
          <div class="form-group">
            <label for="signupName">Name</label>
            <input type="text" id="signupName" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="At least 6 characters" required minlength="6" />
          </div>
          <div id="signupError" class="form-error hidden"></div>
          <button type="submit" class="login-btn">Create Account</button>

          <div class="divider">
            <span>or</span>
          </div>

          <a href="/api/auth/google" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign up with Google
          </a>
        </form>

        <div id="loginStatus" class="login-status"></div>
      </div>
    </div>

    <!-- Main App (hidden until logged in) -->
    <div id="mainApp" class="page hidden">
      <header class="hero">
        <div class="hero__content">
          <div class="user-info">
            <p class="eyebrow">MathQuest</p>
            <p class="user-welcome">Welcome, <span id="userNameDisplay">User</span></p>
            <button id="logoutBtn" class="logout-btn" type="button">Sign Out</button>
          </div>
          <h1>Question Bank</h1>
          <p class="subhead">
            MathQuest gives admins hints and answers while students see focused practice
            questions powered by <code>config.json</code>.
          </p>
          <div class="role-toggle" role="group" aria-label="Choose role">
            <button class="role-btn" data-role="student" type="button">Student View</button>
            <button class="role-btn" data-role="admin" type="button">Admin View</button>
          </div>
        </div>
        <div class="hero__panel">
          <div class="stat">
            <span class="stat__label">Questions</span>
            <span class="stat__value" id="questionCount">0</span>
          </div>
          <div class="stat">
            <span class="stat__label">Papers</span>
            <span class="stat__value" id="paperCount">0</span>
          </div>
          <div class="stat">
            <span class="stat__label">Categories</span>
            <span class="stat__value" id="categoryCount">0</span>
          </div>
        </div>
      </header>

      <section class="controls">
        <div class="control">
          <label for="paperFilter">Paper</label>
          <select id="paperFilter"></select>
        </div>
        <div class="control">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter"></select>
        </div>
        <div class="control control--grow">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="search" placeholder="Search by id or question text" />
        </div>
        <div class="control" id="studyModeControl">
          <label for="viewModeSelect">Student Mode</label>
          <select id="viewModeSelect">
            <option value="list">Question List</option>
            <option value="practice">One By One</option>
          </select>
        </div>
        <div class="control" id="timerControl">
          <label for="timerMinutesInput">Timer (minutes/question)</label>
          <input id="timerMinutesInput" type="number" min="1" max="120" step="1" value="3" />
        </div>
      </section>

      <section class="controls import-panel hidden" id="aiImportPanel">
        <div class="control">
          <label for="paperUploadInput">Question Paper File</label>
          <input id="paperUploadInput" type="file" accept=".txt,.md,.csv,.json,.pdf,image/*,application/pdf" />
        </div>
        <div class="control">
          <label>&nbsp;</label>
          <button id="aiImportBtn" class="mini-btn" type="button">AI Import Questions</button>
        </div>
        <div class="control">
          <label>&nbsp;</label>
          <button id="clearImportedBtn" class="mini-btn" type="button">Clear Imported</button>
        </div>
        <div class="control">
          <label>&nbsp;</label>
          <button id="exportCombinedBtn" class="mini-btn" type="button">Export Combined JSON</button>
        </div>
        <div class="control control--grow">
          <label>Import Status</label>
          <div id="aiImportStatus" class="status-box">Idle</div>
        </div>
      </section>

      <main>
        <div id="questionGrid" class="grid"></div>
      </main>
    </div>

    <script src="auth.js"></script>
    <script src="config-data.js"></script>
    <script src="solutions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
